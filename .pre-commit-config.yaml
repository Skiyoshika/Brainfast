repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
        exclude: "\\.(tif|tiff|png|jpg|nii|gz|csv|bat)$"
      - id: trailing-whitespace
        exclude: "\\.(tif|tiff|png|jpg|nii|gz|csv|bat)$"
      - id: mixed-line-ending
        args: [--fix=lf]
        exclude: "\\.(bat|cmd)$"
      - id: check-json
        files: "\\.(json)$"
        exclude: "^project/configs/run_config_35"
      - id: check-yaml
